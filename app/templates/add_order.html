<!-- 
 * HTML template for the "Add Order" page of the Mini Retail Order application.
 * This page allows users to create a new customer order by filling out a form.
 * The form includes fields for selecting a customer, selecting a product, entering custom text, quantity, and special instructions.
 * The template extends the base.html template to maintain a consistent layout across the application.
 -->
{% extends "base.html" %}

{% block title %}Add Order{% endblock %}

{% block page_heading %}Add New Order{% endblock %}

{% block content %}
<section class="card">
    <h2>Create a New Order</h2>
    <p>Fill in the form below to create a customer order.</p>

    <form id="add-order-form" class="form">
        <div class="form-group">
            <label for="customer_id">Customer</label>
            <select id="customer_id" name="customer_id" required>
                <option value="">Loading customers...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="product_id">Product</label>
            <select id="product_id" name="product_id" required>
                <option value="">Loading products...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="custom_text">Custom Text</label>
            <input
                type="text"
                id="custom_text"
                name="custom_text"
                placeholder="Example: Happy Birthday Sarah"
                required
            />
        </div>

        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input
                type="number"
                id="quantity"
                name="quantity"
                min="1"
                value="1"
                required
            />
        </div>

        <div class="form-group">
            <label for="special_instructions">Special Instructions</label>
            <textarea
                id="special_instructions"
                name="special_instructions"
                rows="4"
                placeholder="Optional notes for this order"
            ></textarea>
        </div>

        <button type="submit" class="button">Create Order</button>
    </form>

    <div id="message" class="message"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/add_order.js"></script>
{% endblock %}
