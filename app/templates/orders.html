<!--
 * HTML template for the "Orders" page of the Mini Retail Order application.
 * This page displays a list of all customer orders and provides a search functionality to find specific orders by their ID.
 * The template extends the base.html template to maintain a consistent layout across the application.
 -->
{% extends "base.html" %}

{% block title %}Orders{% endblock %}

{% block page_heading %}Orders{% endblock %}

{% block content %}
<section class="card">
    <h2>All Orders</h2>
    <p>View all orders or search for a specific order by ID.</p>

    <div class="search-box">
        <input
            type="number"
            id="order-id-input"
            placeholder="Enter order ID"
            min="1"
        />

        <button id="search-order-button" class="button">Search</button>
        <button id="load-all-button" class="button secondary">Load All Orders</button>
    </div>

    <div id="message" class="message"></div>

    <div id="orders-container" class="orders-container">
        <p>Loading orders...</p>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/orders.js"></script>
{% endblock %}
